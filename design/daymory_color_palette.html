
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  .root{padding:1.5rem 0;font-family:var(--font-sans)}
  .mode-tabs{display:flex;gap:6px;margin-bottom:1.5rem}
  .mtab{padding:5px 16px;border-radius:20px;font-size:13px;font-weight:500;border:0.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all .18s}
  .mtab.on{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
  .mode-block{margin-bottom:2rem}
  .mode-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .mode-label::after{content:'';flex:1;height:0.5px;background:var(--color-border-tertiary)}
  .section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin:1.2rem 0 .6rem}
  .swatch-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:.5rem}
  .swatch{border-radius:10px;padding:10px 12px;min-width:110px;cursor:pointer;position:relative;transition:transform .12s}
  .swatch:hover{transform:scale(1.03)}
  .sw-hex{font-size:11px;font-weight:500;margin-top:3px;font-family:var(--font-mono)}
  .sw-name{font-size:12px;font-weight:500}
  .sw-role{font-size:11px;margin-top:1px;opacity:.75}
  .copied-badge{position:absolute;top:6px;right:6px;font-size:10px;font-weight:500;padding:1px 6px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none}
  .swatch.copied .copied-badge{opacity:1}
  .token-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:.5rem}
  .token-table td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
  .token-table td:first-child{color:var(--color-text-secondary);font-family:var(--font-mono);font-size:11px;width:45%}
  .token-table td:last-child{font-family:var(--font-mono);font-size:11px;font-weight:500}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle;flex-shrink:0}
  .semantic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
  .sem-card{border-radius:10px;padding:10px;border:0.5px solid var(--color-border-tertiary)}
  .sem-preview{height:28px;border-radius:6px;margin-bottom:7px}
  .sem-name{font-size:12px;font-weight:500;color:var(--color-text-primary)}
  .sem-hex{font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono)}
</style>

<div class="root">
  <div class="mode-tabs">
    <button class="mtab on" onclick="show('both')">Ambos</button>
    <button class="mtab" onclick="show('light')">Light only</button>
    <button class="mtab" onclick="show('dark')">Dark only</button>
  </div>
  <div id="content"></div>
</div>

<script>
const LIGHT = {
  bg: {
    "bg-primary":   {hex:"#FFFFFF", role:"Fundo principal / cards"},
    "bg-secondary": {hex:"#F5F5F5", role:"Superfície de ecrã"},
    "bg-tertiary":  {hex:"#EBEBEB", role:"Fundo de página"},
    "bg-elevated":  {hex:"#FFFFFF", role:"Modais e overlays"},
  },
  text: {
    "text-primary":   {hex:"#111827", role:"Títulos e corpo"},
    "text-secondary": {hex:"#6B7280", role:"Labels e meta-info"},
    "text-tertiary":  {hex:"#9CA3AF", role:"Placeholders"},
    "text-disabled":  {hex:"#D1D5DB", role:"Estado desactivado"},
  },
  border: {
    "border-default": {hex:"#E5E7EB", role:"Cards e inputs"},
    "border-focus":   {hex:"#2563EB", role:"Input focado"},
    "border-strong":  {hex:"#D1D5DB", role:"Separadores"},
  },
  brand: {
    "brand-primary":   {hex:"#2563EB", role:"CTA, botões primários"},
    "brand-secondary": {hex:"#3B82F6", role:"Hover, links"},
    "brand-subtle":    {hex:"#DBEAFE", role:"Badges, chips, streaks"},
    "brand-deep":      {hex:"#1E3A8A", role:"Headers, nav activo"},
  },
  semantic: {
    "success":        {hex:"#22C55E", role:"Hábitos concluídos"},
    "warning":        {hex:"#F59E0B", role:"Tarefas atrasadas"},
    "danger":         {hex:"#EF4444", role:"Prioridade alta"},
    "info":           {hex:"#06B6D4", role:"Insights / IA"},
    "purple":         {hex:"#7C3AED", role:"Hábitos / stats"},
  },
  nav: {
    "nav-bg":       {hex:"#FFFFFF", role:"Fundo bottom nav"},
    "nav-active":   {hex:"#2563EB", role:"Tab activa"},
    "nav-inactive": {hex:"#D1D5DB", role:"Tab inactiva"},
  }
};

const DARK = {
  bg: {
    "bg-primary":   {hex:"#141414", role:"Fundo principal / ecrã"},
    "bg-secondary": {hex:"#1E1E1E", role:"Cards e superfícies"},
    "bg-tertiary":  {hex:"#262626", role:"Input e rows hover"},
    "bg-elevated":  {hex:"#2A2A2A", role:"Modais e popovers"},
  },
  text: {
    "text-primary":   {hex:"#E5E7EB", role:"Títulos e corpo"},
    "text-secondary": {hex:"#9CA3AF", role:"Labels e meta-info"},
    "text-tertiary":  {hex:"#6B7280", role:"Placeholders"},
    "text-disabled":  {hex:"#374151", role:"Estado desactivado"},
  },
  border: {
    "border-default": {hex:"#2A2A2A", role:"Cards e inputs"},
    "border-focus":   {hex:"#3B82F6", role:"Input focado"},
    "border-strong":  {hex:"#374151", role:"Separadores"},
  },
  brand: {
    "brand-primary":   {hex:"#3B82F6", role:"CTA, botões primários"},
    "brand-secondary": {hex:"#60A5FA", role:"Hover, links"},
    "brand-subtle":    {hex:"#172554", role:"Badges, chips, streaks"},
    "brand-deep":      {hex:"#1E3A8A", role:"Headers, nav activo"},
  },
  semantic: {
    "success":        {hex:"#22C55E", role:"Hábitos concluídos"},
    "warning":        {hex:"#F59E0B", role:"Tarefas atrasadas"},
    "danger":         {hex:"#EF4444", role:"Prioridade alta"},
    "info":           {hex:"#06B6D4", role:"Insights / IA"},
    "purple":         {hex:"#A78BFA", role:"Hábitos / stats"},
  },
  nav: {
    "nav-bg":       {hex:"#0F0F0F", role:"Fundo bottom nav"},
    "nav-active":   {hex:"#3B82F6", role:"Tab activa"},
    "nav-inactive": {hex:"#333333", role:"Tab inactiva"},
  }
};

const SECTION_LABELS = {
  bg:       "Fundos",
  text:     "Tipografia",
  border:   "Bordas",
  brand:    "Marca — Azul primário",
  semantic: "Semânticas — estados",
  nav:      "Navegação",
};

function luminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return 0.2126*r + 0.7152*g + 0.0722*b;
}

function textOnBg(hex) {
  return luminance(hex) > 0.35 ? '#111827' : '#F9FAFB';
}

function copySwatch(el, hex) {
  navigator.clipboard.writeText(hex).catch(()=>{});
  el.classList.add('copied');
  setTimeout(()=>el.classList.remove('copied'), 1200);
}

function buildMode(data, modeKey) {
  const isDark = modeKey === 'dark';
  let html = `<div class="mode-block">`;
  html += `<div class="mode-label">${isDark ? 'Dark mode' : 'Light mode'}</div>`;

  for (const [section, tokens] of Object.entries(data)) {
    html += `<div class="section-title">${SECTION_LABELS[section]}</div>`;
    html += `<div class="swatch-row">`;
    for (const [name, {hex, role}] of Object.entries(tokens)) {
      const textColor = textOnBg(hex);
      const badgeBg = luminance(hex) > 0.35 ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.18)';
      html += `<div class="swatch" style="background:${hex};border:0.5px solid rgba(128,128,128,0.18)"
        onclick="copySwatch(this,'${hex}')">
        <span class="copied-badge" style="background:${badgeBg};color:${textColor}">copiado</span>
        <div class="sw-name" style="color:${textColor}">${name}</div>
        <div class="sw-hex" style="color:${textColor}">${hex}</div>
        <div class="sw-role" style="color:${textColor}">${role}</div>
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function show(mode) {
  document.querySelectorAll('.mtab').forEach(b => {
    b.classList.toggle('on',
      b.textContent === (mode === 'both' ? 'Ambos' : mode === 'light' ? 'Light only' : 'Dark only'));
  });
  let html = '';
  if (mode !== 'dark') html += buildMode(LIGHT, 'light');
  if (mode !== 'light') html += buildMode(DARK, 'dark');
  document.getElementById('content').innerHTML = html;
}

show('both');
</script>
