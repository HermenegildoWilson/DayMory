
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif}

  .root{padding:1.5rem 0.5rem;background:transparent}
  .title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
  .title-row h2{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:var(--color-text-primary)}
  .mode-toggle{display:flex;gap:6px}
  .mode-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all .2s}
  .mode-btn.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary)}

  .screens-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:20px}

  .phone-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
  .phone-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em}
  .phone-frame{width:170px;height:340px;border-radius:28px;padding:10px 7px;position:relative;flex-shrink:0}
  .phone-frame.dark-frame{background:#0f0f0f;border:2px solid #2a2a2a;box-shadow:0 0 0 1px #111}
  .phone-frame.light-frame{background:#e8e8e8;border:2px solid #d0d0d0}
  .phone-notch{width:50px;height:8px;background:inherit;border-radius:0 0 8px 8px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:10}
  .phone-notch.dark-notch{background:#0f0f0f}
  .phone-notch.light-notch{background:#e8e8e8}
  .phone-screen{width:100%;height:100%;border-radius:20px;overflow:hidden;position:relative}
  .phone-screen.dark-screen{background:#141414}
  .phone-screen.light-screen{background:#f5f5f5}

  /* ── STATUS BAR ── */
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px 3px;font-size:9px;font-weight:600}
  .status-bar.dark{color:#888}
  .status-bar.light{color:#555}
  .status-icons{display:flex;gap:3px;align-items:center}
  .bar-seg{width:5px;height:4px;border-radius:1px}

  /* ── SCREEN CONTENT ── */
  .sc{padding:0 10px 10px;display:flex;flex-direction:column;height:calc(100% - 22px);overflow:hidden}

  /* LOGIN */
  .login-logo{text-align:center;padding:16px 0 10px}
  .login-logo .logo-mark{width:36px;height:36px;border-radius:10px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .logo-dark{background:#1e3a8a}
  .logo-light{background:#3b82f6}
  .login-logo .app-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600}
  .login-logo .app-sub{font-size:9px;margin-top:1px}
  .input-group{margin-bottom:7px}
  .input-label{font-size:8px;font-weight:500;margin-bottom:2px}
  .fake-input{border-radius:6px;padding:5px 7px;font-size:8px;width:100%;border:0.5px solid}
  .fake-input.dark-i{background:#1e1e1e;border-color:#333;color:#aaa}
  .fake-input.light-i{background:#fff;border-color:#ddd;color:#666}
  .btn-primary{width:100%;border-radius:6px;padding:7px;font-size:9px;font-weight:600;border:none;cursor:pointer;margin-top:4px}
  .btn-dark-p{background:#3b82f6;color:#fff}
  .btn-light-p{background:#2563eb;color:#fff}
  .divider-row{display:flex;align-items:center;gap:6px;margin:8px 0}
  .divider-line{flex:1;height:0.5px}
  .dark-div{background:#2a2a2a}
  .light-div{background:#ddd}
  .divider-txt{font-size:8px}
  .social-row{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .social-btn{border-radius:6px;padding:5px;font-size:8px;font-weight:500;text-align:center;border:0.5px solid}
  .dark-sb{background:#1e1e1e;border-color:#333;color:#aaa}
  .light-sb{background:#fff;border-color:#ddd;color:#555}
  .link-row{text-align:center;font-size:8px;margin-top:8px}

  /* TASK LIST */
  .screen-header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 6px}
  .screen-header .sh-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600}
  .sh-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600}
  .dark-av{background:#1e3a8a;color:#93c5fd}
  .light-av{background:#dbeafe;color:#1d4ed8}
  .search-bar{border-radius:6px;padding:4px 7px;font-size:8px;border:0.5px solid;display:flex;align-items:center;gap:4px;margin-bottom:8px}
  .dark-search{background:#1e1e1e;border-color:#333;color:#555}
  .light-search{background:#fff;border-color:#ddd;color:#999}
  .tabs-row{display:flex;gap:6px;margin-bottom:8px}
  .tab-pill{font-size:8px;font-weight:500;padding:2px 8px;border-radius:10px}
  .tab-dark-a{background:#1e3a8a;color:#93c5fd}
  .tab-dark-i{color:#555}
  .tab-light-a{background:#dbeafe;color:#1d4ed8}
  .tab-light-i{color:#aaa}
  .task-card{border-radius:8px;padding:7px 8px;margin-bottom:5px;border:0.5px solid}
  .dark-tc{background:#1e1e1e;border-color:#2a2a2a}
  .light-tc{background:#fff;border-color:#e5e7eb}
  .tc-row{display:flex;align-items:flex-start;gap:6px}
  .check-box{width:12px;height:12px;border-radius:3px;border:1.5px solid;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
  .dark-cb{border-color:#444}
  .light-cb{border-color:#d1d5db}
  .check-done{background:#3b82f6;border-color:#3b82f6}
  .check-icon{width:7px;height:5px;position:relative}
  .check-icon::after{content:'';position:absolute;bottom:1px;left:0;width:4px;height:2px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
  .tc-body{flex:1}
  .tc-title{font-size:9px;font-weight:500;line-height:1.3}
  .tc-done{text-decoration:line-through;opacity:.4}
  .dark-tc-t{color:#e5e7eb}
  .light-tc-t{color:#111}
  .tc-meta{display:flex;gap:4px;margin-top:2px;align-items:center}
  .tc-time{font-size:7.5px}
  .dark-tm{color:#555}
  .light-tm{color:#aaa}
  .tc-tag{font-size:7px;padding:1px 4px;border-radius:4px;font-weight:500}
  .tag-blue-d{background:#172554;color:#93c5fd}
  .tag-blue-l{background:#eff6ff;color:#2563eb}
  .tag-red-d{background:#450a0a;color:#fca5a5}
  .tag-red-l{background:#fef2f2;color:#dc2626}
  .tag-green-d{background:#052e16;color:#86efac}
  .tag-green-l{background:#f0fdf4;color:#16a34a}
  .fab{position:absolute;bottom:12px;right:10px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:300}
  .dark-fab{background:#2563eb}
  .light-fab{background:#3b82f6}

  /* CREATE TASK */
  .ct-heading{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;margin-bottom:10px;padding-top:6px}
  .ct-label{font-size:8px;font-weight:500;margin-bottom:2px;margin-top:6px}
  .ct-input{border-radius:6px;padding:5px 7px;font-size:8px;border:0.5px solid;width:100%}
  .ct-textarea{border-radius:6px;padding:5px 7px;font-size:8px;border:0.5px solid;width:100%;height:36px;resize:none}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .ct-select{border-radius:6px;padding:5px 7px;font-size:8px;border:0.5px solid;width:100%;appearance:none}
  .btn-row-2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px}
  .btn-cancel{border-radius:6px;padding:7px;font-size:9px;font-weight:500;border:0.5px solid;cursor:pointer;text-align:center}
  .dark-cancel{background:transparent;border-color:#333;color:#777}
  .light-cancel{background:transparent;border-color:#ddd;color:#888}
  .priority-row{display:flex;gap:4px;margin-top:2px}
  .pri-btn{font-size:7.5px;font-weight:500;padding:2px 7px;border-radius:10px;border:0.5px solid;cursor:pointer}
  .pri-red-a-d{background:#7f1d1d;color:#fca5a5;border-color:#991b1b}
  .pri-red-a-l{background:#fef2f2;color:#dc2626;border-color:#fca5a5}
  .pri-i-d{color:#444;border-color:#2a2a2a;background:transparent}
  .pri-i-l{color:#ccc;border-color:#e5e7eb;background:transparent}

  /* HABITS */
  .hab-streak{border-radius:8px;padding:8px;margin-bottom:8px;text-align:center}
  .dark-hs{background:#172554}
  .light-hs{background:#eff6ff}
  .hs-label{font-size:8px}
  .dark-hsl{color:#60a5fa}
  .light-hsl{color:#2563eb}
  .hs-num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600}
  .dark-hsn{color:#93c5fd}
  .light-hsn{color:#1d4ed8}
  .hs-sub{font-size:7.5px}
  .dark-hss{color:#3b82f6}
  .light-hss{color:#60a5fa}
  .hab-card{border-radius:8px;padding:6px 8px;margin-bottom:5px;border:0.5px solid}
  .dark-hc{background:#1e1e1e;border-color:#2a2a2a}
  .light-hc{background:#fff;border-color:#e5e7eb}
  .hc-row{display:flex;align-items:center;gap:6px}
  .hc-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
  .hc-body{flex:1}
  .hc-name{font-size:9px;font-weight:500}
  .dark-hcn{color:#e5e7eb}
  .light-hcn{color:#111}
  .hc-meta{font-size:7.5px;margin-top:1px}
  .dark-hcm{color:#555}
  .light-hcm{color:#aaa}
  .hc-dots{display:flex;gap:2px;margin-top:3px}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot-on-d{background:#3b82f6}
  .dot-on-l{background:#3b82f6}
  .dot-off-d{background:#2a2a2a}
  .dot-off-l{background:#e5e7eb}
  .dot-today{outline:2px solid}
  .dot-today-d{outline-color:#60a5fa}
  .dot-today-l{outline-color:#3b82f6}
  .hc-check{width:18px;height:18px;border-radius:50%;border:1.5px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .hcc-done{background:#22c55e;border-color:#22c55e}
  .hcc-idle-d{border-color:#333}
  .hcc-idle-l{border-color:#d1d5db}

  /* DASHBOARD */
  .db-welcome{font-size:10px;margin-bottom:8px}
  .dark-dbw{color:#888}
  .light-dbw{color:#aaa}
  .db-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600}
  .dark-dbn{color:#e5e7eb}
  .light-dbn{color:#111}
  .db-cards{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
  .db-card{border-radius:8px;padding:7px 8px;border:0.5px solid}
  .dark-dc{background:#1e1e1e;border-color:#2a2a2a}
  .light-dc{background:#fff;border-color:#e5e7eb}
  .dc-val{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600}
  .dc-lbl{font-size:7.5px;margin-top:1px}
  .dark-dcl{color:#555}
  .light-dcl{color:#aaa}
  .dark-dcv-blue{color:#60a5fa}
  .light-dcv-blue{color:#2563eb}
  .dark-dcv-green{color:#4ade80}
  .light-dcv-green{color:#16a34a}
  .dark-dcv-amber{color:#fbbf24}
  .light-dcv-amber{color:#d97706}
  .dark-dcv-purple{color:#a78bfa}
  .light-dcv-purple{color:#7c3aed}
  .db-chart-wrap{border-radius:8px;padding:7px 8px;border:0.5px solid;margin-bottom:8px}
  .dark-cw{background:#1e1e1e;border-color:#2a2a2a}
  .light-cw{background:#fff;border-color:#e5e7eb}
  .chart-title{font-size:8px;font-weight:500;margin-bottom:5px}
  .dark-ctt{color:#888}
  .light-ctt{color:#aaa}
  .bar-chart{display:flex;align-items:flex-end;gap:3px;height:45px}
  .bar{border-radius:3px 3px 0 0;flex:1}
  .day-labels{display:flex;gap:3px;margin-top:2px}
  .day-lbl{flex:1;font-size:6.5px;text-align:center}
  .dark-dl{color:#444}
  .light-dl{color:#ccc}
  .db-list-title{font-size:9px;font-weight:500;margin-bottom:5px}
  .dark-dlt{color:#888}
  .light-dlt{color:#aaa}
  .db-task-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
  .dtr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .dtr-title{font-size:8px;flex:1}
  .dark-dtrt{color:#ccc}
  .light-dtrt{color:#333}
  .dtr-time{font-size:7.5px}
  .dark-dttime{color:#555}
  .light-dttime{color:#bbb}

  /* BOTTOM NAV */
  .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:36px;display:flex;border-top:0.5px solid}
  .dark-bn{background:#0f0f0f;border-color:#1e1e1e}
  .light-bn{background:#fff;border-color:#e5e7eb}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .nav-icon{font-size:14px;line-height:1}
  .nav-lbl{font-size:6.5px}
  .nav-active-d{color:#3b82f6}
  .nav-active-l{color:#2563eb}
  .nav-inactive-d{color:#333}
  .nav-inactive-l{color:#ccc}
</style>

<div class="root">
  <div class="title-row">
    <h2>DayMory — Mockups das Telas MVP</h2>
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('both')">Ambos</button>
      <button class="mode-btn" onclick="setMode('dark')">Dark</button>
      <button class="mode-btn" onclick="setMode('light')">Light</button>
    </div>
  </div>
  <div class="screens-grid" id="grid"></div>
</div>

<script>
const D = 'dark', L = 'light';
let currentMode = 'both';

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === m || (b.textContent === 'Ambos' && m === 'both')));
  renderAll();
}

function statusBar(mode) {
  const bars = mode === D
    ? `<div class="bar-seg" style="background:#555"></div><div class="bar-seg" style="background:#555"></div><div class="bar-seg" style="background:#555"></div><div class="bar-seg" style="background:#777"></div>`
    : `<div class="bar-seg" style="background:#aaa"></div><div class="bar-seg" style="background:#aaa"></div><div class="bar-seg" style="background:#aaa"></div><div class="bar-seg" style="background:#bbb"></div>`;
  return `<div class="status-bar ${mode === D ? 'dark' : 'light'}">
    <span>9:41</span>
    <div class="status-icons">${bars}
      <svg width="12" height="8" viewBox="0 0 12 8" style="margin-left:2px"><rect x="0" y="2" width="10" height="6" rx="1" fill="${mode===D?'#555':'#aaa'}" stroke="${mode===D?'#777':'#bbb'}" stroke-width="0.5"/><rect x="10.5" y="3" width="1.5" height="2" rx="0.5" fill="${mode===D?'#555':'#aaa'}"/><rect x="1" y="3" width="7" height="4" rx="0.5" fill="${mode===D?'#3b82f6':'#3b82f6'}"/></svg>
    </div>
  </div>`;
}

function bottomNav(active, mode) {
  const d = mode === D;
  const items = [
    {icon:'⊞', lbl:'Início', id:'home'},
    {icon:'◉', lbl:'Tarefas', id:'tasks'},
    {icon:'◈', lbl:'Hábitos', id:'habits'},
    {icon:'▦', lbl:'Stats', id:'stats'},
  ];
  return `<div class="bottom-nav ${d?'dark-bn':'light-bn'}">
    ${items.map(it=>`<div class="nav-item ${it.id===active?(d?'nav-active-d':'nav-active-l'):(d?'nav-inactive-d':'nav-inactive-l')}">
      <span class="nav-icon">${it.icon}</span>
      <span class="nav-lbl">${it.lbl}</span>
    </div>`).join('')}
  </div>`;
}

function phoneFrame(label, screenHTML, mode) {
  const d = mode === D;
  return `<div class="phone-wrap">
    <div class="phone-label" style="color:${d?'#666':'#aaa'}">${label} ${d?'• Dark':'• Light'}</div>
    <div class="phone-frame ${d?'dark-frame':'light-frame'}">
      <div class="phone-notch ${d?'dark-notch':'light-notch'}"></div>
      <div class="phone-screen ${d?'dark-screen':'light-screen'}">
        ${statusBar(mode)}
        ${screenHTML}
      </div>
    </div>
  </div>`;
}

function loginScreen(mode) {
  const d = mode === D;
  const dm = d ? 'dark' : 'light';
  return `<div class="sc">
    <div class="login-logo">
      <div class="logo-mark ${d?'logo-dark':'logo-light'}">☀</div>
      <div class="app-name" style="color:${d?'#e5e7eb':'#111'}">DayMory</div>
      <div class="app-sub" style="color:${d?'#555':'#aaa'}">O teu dia, organizado.</div>
    </div>
    <div class="input-group">
      <div class="input-label" style="color:${d?'#777':'#888'}">Email</div>
      <div class="fake-input ${d?'dark-i':'light-i'}">hermenegildo@gmail.com</div>
    </div>
    <div class="input-group">
      <div class="input-label" style="color:${d?'#777':'#888'}">Palavra-passe</div>
      <div class="fake-input ${d?'dark-i':'light-i'}">••••••••</div>
    </div>
    <div style="text-align:right;font-size:7.5px;color:${d?'#3b82f6':'#2563eb'};margin-bottom:6px;margin-top:2px">Esqueceste?</div>
    <button class="btn-primary ${d?'btn-dark-p':'btn-light-p'}">Entrar</button>
    <div class="divider-row">
      <div class="divider-line ${d?'dark-div':'light-div'}"></div>
      <span class="divider-txt" style="color:${d?'#444':'#ccc'}">ou</span>
      <div class="divider-line ${d?'dark-div':'light-div'}"></div>
    </div>
    <div class="social-row">
      <div class="social-btn ${d?'dark-sb':'light-sb'}">G  Google</div>
      <div class="social-btn ${d?'dark-sb':'light-sb'}">f  Apple</div>
    </div>
    <div class="link-row" style="color:${d?'#555':'#aaa'}">Não tens conta? <span style="color:${d?'#3b82f6':'#2563eb'}">Registar</span></div>
  </div>`;
}

function taskListScreen(mode) {
  const d = mode === D;
  const tasks = [
    {title:'Rever PR do módulo de sync', time:'09:00', tag:'Dev', tagCls:d?'tag-blue-d':'tag-blue-l', done:false},
    {title:'Ligar ao cliente sobre proposta', time:'11:30', tag:'Urgente', tagCls:d?'tag-red-d':'tag-red-l', done:false},
    {title:'Configurar Supabase Auth', time:'14:00', tag:'Dev', tagCls:d?'tag-blue-d':'tag-blue-l', done:true},
    {title:'Fazer deploy do build alpha', time:'16:00', tag:'Deploy', tagCls:d?'tag-green-d':'tag-green-l', done:false},
  ];
  return `<div class="sc" style="position:relative;height:calc(100% - 22px)">
    <div class="screen-header">
      <div class="sh-title" style="color:${d?'#e5e7eb':'#111'}">As minhas tarefas</div>
      <div class="sh-avatar ${d?'dark-av':'light-av'}">H</div>
    </div>
    <div class="search-bar ${d?'dark-search':'light-search'}">
      <span style="font-size:9px">⌕</span><span>Pesquisar tarefas...</span>
    </div>
    <div class="tabs-row">
      <span class="tab-pill ${d?'tab-dark-a':'tab-light-a'}">Hoje</span>
      <span class="tab-pill ${d?'tab-dark-i':'tab-light-i'}">Semana</span>
      <span class="tab-pill ${d?'tab-dark-i':'tab-light-i'}">Todas</span>
    </div>
    <div style="font-size:8px;font-weight:500;color:${d?'#666':'#bbb'};margin-bottom:4px">Sábado, 28 Mar • 4 pendentes</div>
    ${tasks.map(t=>`<div class="task-card ${d?'dark-tc':'light-tc'}">
      <div class="tc-row">
        <div class="check-box ${t.done?'check-done':(d?'dark-cb':'light-cb')}">
          ${t.done?'<div class="check-icon"></div>':''}
        </div>
        <div class="tc-body">
          <div class="tc-title ${t.done?'tc-done':''} ${d?'dark-tc-t':'light-tc-t'}">${t.title}</div>
          <div class="tc-meta">
            <span class="tc-time ${d?'dark-tm':'light-tm'}">⏰ ${t.time}</span>
            <span class="tc-tag ${t.tagCls}">${t.tag}</span>
          </div>
        </div>
      </div>
    </div>`).join('')}
    <div class="fab ${d?'dark-fab':'light-fab'}">+</div>
    ${bottomNav('tasks', mode)}
  </div>`;
}

function createTaskScreen(mode) {
  const d = mode === D;
  return `<div class="sc">
    <div style="display:flex;align-items:center;gap:6px;padding:6px 0 4px">
      <span style="font-size:12px;color:${d?'#555':'#ccc'}">←</span>

function renderAll() {
  const grid = document.getElementById('grid');
  const modes = currentMode === 'both' ? [D, L] : [currentMode];
  
  let html = '';
  if (currentMode === 'both') {
    screenDefs.forEach(s => {
      html += phoneFrame(s.label, s.fn(D), D);
      html += phoneFrame(s.label, s.fn(L), L);
    });
  } else {
    screenDefs.forEach(s => {
      html += phoneFrame(s.label, s.fn(currentMode), currentMode);
    });
  }
  grid.innerHTML = html;

  const cols = currentMode === 'both' ? 'repeat(auto-fit, minmax(170px, 1fr))' : 'repeat(auto-fit, minmax(180px, 1fr))';
  grid.style.gridTemplateColumns = cols;
}

renderAll();
